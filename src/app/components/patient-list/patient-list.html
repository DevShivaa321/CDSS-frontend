<p-toast />
<p-confirmDialog />

<div style="padding: 2rem;">

  <!-- Header Toolbar -->
  <p-toolbar styleClass="mb-4">
    <ng-template #start>
      <h2 style="margin:0; color: #1e3a5f;">
        <i class="pi pi-users" style="margin-right: 8px;"></i>
        Patient Management
      </h2>
    </ng-template>
    <ng-template #end>
      <p-button label="Add Patient" icon="pi pi-plus"
        severity="success" (onClick)="openAddDialog()" />
    </ng-template>
  </p-toolbar>

  <!-- Patient Table -->
  <p-table
    [value]="patients"
    [loading]="loading"
    [paginator]="true"
    [rows]="8"
    [rowsPerPageOptions]="[5,8,15]"
    styleClass="p-datatable-striped p-datatable-gridlines"
    dataKey="patientId">

    <ng-template #header>
      <tr>
        <th pSortableColumn="patientId">
          # ID <p-sortIcon field="patientId"/>
        </th>
        <th pSortableColumn="firstName">
          Name <p-sortIcon field="firstName"/>
        </th>
        <th pSortableColumn="dateOfBirth">
          Date of Birth <p-sortIcon field="dateOfBirth"/>
        </th>
        <th pSortableColumn="gender">
          Gender <p-sortIcon field="gender"/>
        </th>
        <th>Actions</th>
      </tr>
    </ng-template>

    <ng-template #body let-patient>
      <tr>
        <td>{{ patient.patientId }}</td>
        <td><strong>{{ patient.firstName }} {{ patient.lastName }}</strong></td>
        <td>{{ patient.dateOfBirth }}</td>
        <td>
          <p-tag
            [value]="patient.gender"
            [severity]="patient.gender === 'male' ? 'info' :
                        patient.gender === 'female' ? 'warn' : 'secondary'" />
        </td>
        <td>
          <p-button icon="pi pi-pencil" severity="info"
            [rounded]="true" [text]="true"
            (onClick)="openEditDialog(patient)"
            pTooltip="Edit Patient" />
          <p-button icon="pi pi-trash" severity="danger"
            [rounded]="true" [text]="true"
            (onClick)="confirmDelete(patient)"
            pTooltip="Delete Patient" />
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="5" style="text-align:center; padding: 2rem; color: #888;">
          <i class="pi pi-inbox" style="font-size: 2rem; display:block; margin-bottom:8px;"></i>
          No patients found. Click "Add Patient" to begin.
        </td>
      </tr>
    </ng-template>

  </p-table>
</div>

<!-- Add / Edit Dialog -->
<p-dialog
  [(visible)]="displayDialog"
  [header]="isEditMode ? 'Edit Patient' : 'Add New Patient'"
  [modal]="true"
  [style]="{width: '500px'}"
  [draggable]="false"
  [resizable]="false">

  <div style="display:flex; flex-direction:column; gap:1rem; padding: 0.5rem 0;">

    <div>
      <label style="display:block; margin-bottom:4px; font-weight:600;">First Name</label>
      <input pInputText [(ngModel)]="selectedPatient.firstName"
        placeholder="Enter first name" style="width:100%" />
    </div>

    <div>
      <label style="display:block; margin-bottom:4px; font-weight:600;">Last Name</label>
      <input pInputText [(ngModel)]="selectedPatient.lastName"
        placeholder="Enter last name" style="width:100%" />
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
      <div>
        <label style="display:block; margin-bottom:4px; font-weight:600;">Date of Birth</label>
        <input pInputText type="date" [(ngModel)]="selectedPatient.dateOfBirth"
          style="width:100%" />
      </div>
      <div>
        <label style="display:block; margin-bottom:4px; font-weight:600;">Gender</label>
        <p-select
          [options]="genderOptions"
          [(ngModel)]="selectedPatient.gender"
          placeholder="Select Gender"
          appendTo="body"
          style="width:100%" />
      </div>
    </div>

  </div>

  <ng-template #footer>
    <p-button label="Cancel" icon="pi pi-times"
      severity="secondary" (onClick)="displayDialog = false" />
    <p-button
      [label]="isEditMode ? 'Update Patient' : 'Save Patient'"
      icon="pi pi-check"
      severity="success"
      (onClick)="savePatient()" />
  </ng-template>

</p-dialog>
